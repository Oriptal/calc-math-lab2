name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-runner
    steps:
      - name: Install system dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            git build-essential cmake ninja-build pkg-config patchelf \
            python3 python3-venv \
            libgl1-mesa-dev libegl1 libfontconfig1 libdbus-1-3 \
            libxkbcommon-dev libxkbcommon-x11-0 \
            libxcb-cursor-dev libxcb-cursor0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-sync1 \
            libxcb-xfixes0 libxcb-xinerama0 libxcb-xkb1 \
            jq curl ca-certificates

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt 6.8 via aqt
        run: |
          python3 -m venv /opt/qtvenv
          /opt/qtvenv/bin/pip install --upgrade pip
          /opt/qtvenv/bin/pip install aqtinstall
          /opt/qtvenv/bin/aqt install-qt linux desktop 6.8.0 linux_gcc_64 \
            -m qtcharts -O /opt/Qt
          QT_DIR=/opt/Qt/6.8.0/gcc_64
          echo "$QT_DIR/bin" >> $GITHUB_PATH
          {
            echo "CMAKE_PREFIX_PATH=$QT_DIR"
            echo "QT_ROOT_DIR=$QT_DIR"
            echo "LD_LIBRARY_PATH=$QT_DIR/lib"
          } >> $GITHUB_ENV

      - name: Package
        env:
          BUILD_DIR: ${{ github.workspace }}/build
          DIST_DIR: ${{ github.workspace }}/dist/calc-math-lab2-linux
          BUILD_TYPE: Release
        run: ./package.sh

      - name: Archive
        run: |
          cd dist
          tar -czf calc-math-lab2-linux-x86_64.tar.gz calc-math-lab2-linux

      - name: Publish release on Forgejo
        if: startsWith(github.ref, 'refs/tags/')
        env:
          FORGEJO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          ASSET="calc-math-lab2-linux-x86_64.tar.gz"

          NOTES=$(awk -v tag="$TAG" '
            $0 ~ "^## " tag " " { found = 1; next }
            found && /^- - -/      { exit }
            found && /^## v/       { exit }
            found                  { print }
          ' CHANGELOG.md || true)
          if [ -z "$NOTES" ]; then
            NOTES="Release $TAG"
          fi

          RESP=$(curl -fsSL -X POST \
            -H "Authorization: token ${FORGEJO_TOKEN}" \
            -H "Content-Type: application/json" \
            "${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}/releases" \
            -d "$(jq -n --arg tag "$TAG" --arg name "$TAG" --arg body "$NOTES" \
                '{tag_name: $tag, name: $name, body: $body, draft: false, prerelease: false}')")

          REL_ID=$(printf '%s' "$RESP" | jq -r '.id')
          echo "Release id: $REL_ID"

          curl -fsSL -X POST \
            -H "Authorization: token ${FORGEJO_TOKEN}" \
            -F "attachment=@dist/${ASSET}" \
            "${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}/releases/${REL_ID}/assets?name=${ASSET}"
