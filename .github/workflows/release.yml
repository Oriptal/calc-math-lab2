name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            patchelf \
            libxcb-cursor-dev \
            libxkbcommon-x11-0 \
            ninja-build

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.0"
          modules: qtcharts
          cache: true

      - name: Package
        env:
          BUILD_DIR: ${{ github.workspace }}/build
          DIST_DIR: ${{ github.workspace }}/dist/calc-math-lab2-linux
          BUILD_TYPE: Release
        run: ./package.sh

      - name: Archive
        run: |
          cd dist
          tar -czf calc-math-lab2-linux-x86_64.tar.gz calc-math-lab2-linux

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: calc-math-lab2-linux-x86_64
          path: dist/calc-math-lab2-linux-x86_64.tar.gz

  create-release:
    runs-on: ubuntu-latest
    needs: build-linux
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: calc-math-lab2-linux-x86_64
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/calc-math-lab2-linux-x86_64.tar.gz
